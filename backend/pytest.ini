[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
pythonpath = .

# ── Test markers for solo-dev speed ──
# Quick run:  .\run-smoke-tests.ps1   (or: pytest -m smoke)
# Full run:   pytest
markers =
    smoke: Core path tests — auth, chat, clone. Runs in under 1 min. Use daily.
    slow:  Tests that hit external APIs or take >5s. Run before shipping only.

