version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: soulclone-postgres
    environment:
      POSTGRES_DB: soulclone
      POSTGRES_USER: soulclone
      POSTGRES_PASSWORD: ${DB_PASSWORD:-soulclone_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soulclone -d soulclone"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: soulclone-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: soulclone-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://soulclone:${DB_PASSWORD:-soulclone_secret}@postgres/soulclone
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-soulclone_super_secret_key_change_in_production}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build: ./backend
    container_name: soulclone-celery
    environment:
      - DATABASE_URL=postgresql+asyncpg://soulclone:${DB_PASSWORD:-soulclone_secret}@postgres/soulclone
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-soulclone_super_secret_key_change_in_production}
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    command: celery -A celery_worker worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: soulclone-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:
