<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoulClone Manifesto</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #050508;
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
}
#canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}
.content {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  text-align: center;
}
.badge {
  font-size: 12px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(0,240,255,0.6);
  margin-bottom: 32px;
  animation: fadeInDown 1.2s ease-out both;
}
.headline {
  font-size: clamp(28px, 5vw, 64px);
  font-weight: 700;
  line-height: 1.3;
  color: #fff;
  max-width: 800px;
  margin-bottom: 24px;
  animation: fadeInUp 1.2s 0.3s ease-out both;
}
.headline span {
  background: linear-gradient(135deg, #00f0ff, #ff006e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subline {
  font-size: clamp(14px, 2vw, 20px);
  color: rgba(255,255,255,0.5);
  max-width: 600px;
  line-height: 1.8;
  margin-bottom: 48px;
  animation: fadeInUp 1.2s 0.6s ease-out both;
}
.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  animation: fadeInUp 1.2s 0.9s ease-out both;
}
.pill {
  padding: 8px 20px;
  border-radius: 100px;
  font-size: 13px;
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
}
.pill.cyan { border-color: rgba(0,240,255,0.25); color: rgba(0,240,255,0.8); }
.pill.magenta { border-color: rgba(255,0,110,0.25); color: rgba(255,0,110,0.8); }
.pill.gold { border-color: rgba(255,190,11,0.25); color: rgba(255,190,11,0.8); }
.footer {
  position: absolute;
  bottom: 32px;
  left: 0; right: 0;
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 2px;
  animation: fadeIn 2s 1.5s ease-out both;
}
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="content">
  <div class="badge">SoulClone Manifesto</div>
  <div class="headline">
    社交正在杀死真诚。<br>
    我们造了一个<span>分身</span>来对抗它。
  </div>
  <div class="subline">
    你关机的那一刻，另一个你，正在真诚地与世界说你好。
  </div>
  <div class="pills">
    <div class="pill cyan">人格蒸馏</div>
    <div class="pill magenta">数字孪生</div>
    <div class="pill gold">悬疑社交</div>
    <div class="pill">WebSocket 实时</div>
    <div class="pill">React 19</div>
    <div class="pill">FastAPI</div>
  </div>
  <div class="footer">github.com/David-coder-hnu/SoulClone</div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const COLORS = ['#00f0ff', '#ff006e', '#ffbe0b'];
const MAX_PARTICLES = Math.min(120, Math.floor((window.innerWidth * window.innerHeight) / 15000));

class Particle {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.size = Math.random() * 1.5 + 0.5;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.alpha = Math.random() * 0.3 + 0.1;
    this.phase = Math.random() * Math.PI * 2;
  }
  update() {
    this.phase += 0.008;
    this.x += this.vx + Math.sin(this.phase) * 0.06;
    this.y += this.vy + Math.cos(this.phase * 0.7) * 0.06;
    if (this.x < -10) this.x = W + 10;
    if (this.x > W + 10) this.x = -10;
    if (this.y < -10) this.y = H + 10;
    if (this.y > H + 10) this.y = -10;
  }
  draw() {
    const flicker = 0.5 + Math.sin(this.phase * 2) * 0.5;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = this.alpha * flicker;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
    const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
    g.addColorStop(0, this.color + '33');
    g.addColorStop(1, this.color + '00');
    ctx.fillStyle = g;
    ctx.fill();
  }
}

for (let i = 0; i < MAX_PARTICLES; i++) particles.push(new Particle());

function animate() {
  ctx.clearRect(0, 0, W, H);
  particles.forEach(p => { p.update(); p.draw(); });
  ctx.globalAlpha = 0.08;
  for (let i = 0; i < particles.length; i++) {
    let connections = 0;
    for (let j = i + 1; j < particles.length; j++) {
      if (connections >= 3) break;
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        const alpha = (1 - dist / 120) * 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = particles[i].color;
        ctx.globalAlpha = alpha;
        ctx.lineWidth = 0.5;
        ctx.stroke();
        connections++;
      }
    }
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
