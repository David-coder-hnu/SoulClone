<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%">
  <defs>
    <!-- Background gradient mesh -->
    <radialGradient id="g1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#0a0a1a" />
      <stop offset="100%" stop-color="#050508" />
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#0f0f1e" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#050508" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-magenta" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff006e" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ff006e" stop-opacity="0" />
    </radialGradient>
    <!-- Text gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#ff006e" />
      <stop offset="100%" stop-color="#ffbe0b" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#g1)" />
  <rect width="800" height="300" fill="url(#g2)" />

  <!-- Ambient glow orbs -->
  <circle cx="150" cy="200" r="120" fill="url(#glow-cyan)" />
  <circle cx="650" cy="100" r="100" fill="url(#glow-magenta)" />

  <!-- Noise texture overlay (simulated with dots) -->
  <g opacity="0.03">
    <circle cx="100" cy="80" r="1.5" fill="#fff"/><circle cx="220" cy="140" r="1" fill="#fff"/>
    <circle cx="340" cy="60" r="1.5" fill="#fff"/><circle cx="460" cy="200" r="1" fill="#fff"/>
    <circle cx="580" cy="120" r="1.5" fill="#fff"/><circle cx="700" cy="240" r="1" fill="#fff"/>
    <circle cx="130" cy="250" r="1" fill="#fff"/><circle cx="280" cy="180" r="1.5" fill="#fff"/>
    <circle cx="420" cy="90" r="1" fill="#fff"/><circle cx="560" cy="260" r="1.5" fill="#fff"/>
    <circle cx="680" cy="160" r="1" fill="#fff"/><circle cx="80" cy="190" r="1.5" fill="#fff"/>
    <circle cx="200" cy="110" r="1" fill="#fff"/><circle cx="360" cy="240" r="1.5" fill="#fff"/>
    <circle cx="500" cy="70" r="1" fill="#fff"/><circle cx="620" cy="210" r="1.5" fill="#fff"/>
    <circle cx="740" cy="130" r="1" fill="#fff"/><circle cx="160" cy="270" r="1.5" fill="#fff"/>
    <circle cx="300" cy="50" r="1" fill="#fff"/><circle cx="440" cy="170" r="1.5" fill="#fff"/>
    <circle cx="520" cy="280" r="1" fill="#fff"/><circle cx="660" cy="80" r="1.5" fill="#fff"/>
    <circle cx="760" cy="220" r="1" fill="#fff"/><circle cx="120" cy="150" r="1.5" fill="#fff"/>
    <circle cx="260" cy="100" r="1" fill="#fff"/><circle cx="380" cy="260" r="1.5" fill="#fff"/>
    <circle cx="480" cy="140" r="1" fill="#fff"/><circle cx="600" cy="50" r="1.5" fill="#fff"/>
    <circle cx="720" cy="190" r="1" fill="#fff"/><circle cx="90" cy="230" r="1.5" fill="#fff"/>
    <circle cx="240" cy="70" r="1" fill="#fff"/><circle cx="400" cy="210" r="1.5" fill="#fff"/>
    <circle cx="540" cy="110" r="1" fill="#fff"/><circle cx="640" cy="250" r="1.5" fill="#fff"/>
    <circle cx="780" cy="170" r="1" fill="#fff"/><circle cx="140" cy="290" r="1.5" fill="#fff"/>
    <circle cx="320" cy="130" r="1" fill="#fff"/><circle cx="460" cy="60" r="1.5" fill="#fff"/>
    <circle cx="580" cy="230" r="1" fill="#fff"/><circle cx="700" cy="90" r="1.5" fill="#fff"/>
    <circle cx="110" cy="200" r="1" fill="#fff"/><circle cx="250" cy="160" r="1.5" fill="#fff"/>
    <circle cx="370" cy="280" r="1" fill="#fff"/><circle cx="490" cy="120" r="1.5" fill="#fff"/>
    <circle cx="610" cy="180" r="1" fill="#fff"/><circle cx="730" cy="260" r="1.5" fill="#fff"/>
    <circle cx="170" cy="100" r="1" fill="#fff"/><circle cx="290" cy="220" r="1.5" fill="#fff"/>
    <circle cx="410" cy="80" r="1" fill="#fff"/><circle cx="530" cy="150" r="1.5" fill="#fff"/>
    <circle cx="650" cy="270" r="1" fill="#fff"/><circle cx="770" cy="110" r="1.5" fill="#fff"/>
    <circle cx="190" cy="240" r="1" fill="#fff"/><circle cx="310" cy="90" r="1.5" fill="#fff"/>
    <circle cx="430" cy="190" r="1" fill="#fff"/><circle cx="550" cy="70" r="1.5" fill="#fff"/>
    <circle cx="670" cy="130" r="1" fill="#fff"/><circle cx="790" cy="200" r="1.5" fill="#fff"/>
    <circle cx="210" cy="170" r="1" fill="#fff"/><circle cx="330" cy="250" r="1.5" fill="#fff"/>
    <circle cx="450" cy="110" r="1" fill="#fff"/><circle cx="570" cy="290" r="1.5" fill="#fff"/>
    <circle cx="690" cy="60" r="1" fill="#fff"/><circle cx="810" cy="140" r="1.5" fill="#fff"/>
  </g>

  <!-- Constellation lines -->
  <g stroke="#00f0ff" stroke-width="0.5" opacity="0.15">
    <line x1="150" y1="80" x2="220" y2="140"/><line x1="220" y1="140" x2="340" y2="60"/>
    <line x1="340" y1="60" x2="460" y2="200"/><line x1="460" y1="200" x2="580" y2="120"/>
    <line x1="580" y1="120" x2="650" y2="180"/><line x1="650" y1="180" x2="700" y2="140"/>
    <line x1="280" y1="180" x2="340" y2="60"/><line x1="420" y1="90" x2="460" y2="200"/>
    <line x1="560" y1="260" x2="580" y2="120"/><line x1="80" y1="190" x2="150" y2="80"/>
  </g>

  <!-- Title -->
  <text x="400" y="150" text-anchor="middle" font-family="'Space Grotesk', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="8" fill="url(#text-grad)" filter="url(#glow)">
    SOULCLONE
  </text>

  <!-- Tagline -->
  <text x="400" y="195" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" letter-spacing="2" fill="#8b8b9a">
    你的灵魂，不止一个容器
  </text>

  <!-- Decorative line -->
  <line x1="300" y1="225" x2="500" y2="225" stroke="url(#text-grad)" stroke-width="1" opacity="0.4" />
  <circle cx="300" cy="225" r="2" fill="#00f0ff" opacity="0.6" />
  <circle cx="500" cy="225" r="2" fill="#ffbe0b" opacity="0.6" />

  <!-- Bottom label -->
  <text x="400" y="260" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="3" fill="#4a4a5a">
    AI DIGITAL TWIN  ×  IMMERSIVE SOCIAL
  </text>
</svg>
